- type: entity
  id: UndeterminedPDVInfiltratorKit
  name: PDV Infiltrator equipment selector
  description: A small remote utilizing bluespace technology to drop in an imperial infiltrator kit of your choosing.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Devices/unique_teleporters.rsi
    state: standard
  - type: ThiefUndeterminedBackpack
    possibleSets:
    - KitSelectorPDVInfiltratorSabateour
    - KitSelectorPDVInfiltratorChameleon
    maxSelectedSets: 1
  - type: ActivatableUI
    key: enum.ThiefBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.ThiefBackpackUIKey.Key:
        type: ThiefBackpackBoundUserInterface

