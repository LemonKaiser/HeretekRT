      lineType: thought
      text: heretek-dialogue-fizzo-rumors-002
      choices:
        - text: heretek-dialogue-fizzo-rumors-choice-1
          conditions:
            - type: CounterEquals
              counter: wh40k_fizzo_courier_stage
              amount: 0
          actions:
            - type: SetCounter
              counter: wh40k_fizzo_courier_stage
              amount: 1
          responseSteps:
            - speaker: initiator
              text: heretek-dialogue-fizzo-rumors-choice-1-selected
            - speaker: npc
              text: heretek-dialogue-fizzo-rumors-choice-1-response
        - text: heretek-dialogue-fizzo-rumors-choice-1-followup
          conditions:
            - type: CounterAtLeast
              counter: wh40k_fizzo_courier_stage
              amount: 1
          responseSteps:
            - speaker: initiator
              text: heretek-dialogue-fizzo-rumors-choice-1-followup-selected
            - speaker: npc
              text: heretek-dialogue-fizzo-rumors-choice-1-followup-response
        - text: heretek-dialogue-fizzo-rumors-choice-2
          responseSteps:
            - speaker: initiator
              text: heretek-dialogue-fizzo-rumors-choice-2-selected
            - speaker: npc
              text: heretek-dialogue-fizzo-rumors-choice-2-response
        - text: heretek-dialogue-fizzo-rumors-choice-3
          actions:
            - type: CloseDialogue
    - speaker: npc
      text: heretek-dialogue-fizzo-rumors-003

- type: wh40kDialogue
