- type: wh40kDialogue
  id: WH40KFizzoBase
  interactionMode: Personal
  startActions:
    - type: FaceSpeaker
      speaker: npc
      targetSpeaker: initiator
  steps:
    - type: choice
      speaker: npc
      text: heretek-dialogue-fizzo-base-001
      choices:
        - text: heretek-dialogue-fizzo-base-choice-store
          conditions:
            - type: StoreAvailable
          actions:
            - type: OpenStore
        - text: heretek-dialogue-fizzo-base-choice-whiskey
          conditions:
            - type: CounterAtMost
              counter: wh40k_fizzo_whiskey_served
              amount: 3
          nextDialogue: WH40KFizzoEncore
          responseSteps:
            - speaker: initiator
              text: heretek-dialogue-fizzo-base-choice-whiskey-selected
        - text: heretek-dialogue-fizzo-base-choice-whiskey
          conditions:
            - type: CounterAtLeast
              counter: wh40k_fizzo_whiskey_served
              amount: 4
          nextDialogue: WH40KFizzoCutoff
          responseSteps:
            - speaker: initiator
              text: heretek-dialogue-fizzo-base-choice-whiskey-selected
        - text: heretek-dialogue-fizzo-base-choice-rumors
          nextDialogue: WH40KFizzoRumors
        - text: heretek-dialogue-fizzo-base-choice-leave
          actions:
            - type: CloseDialogue

- type: wh40kDialogue
  id: WH40KFizzoRumors
  interactionMode: Personal
  startActions:
