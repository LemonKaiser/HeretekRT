- type: entity
  abstract: true
  parent: ClothingBackpack
  id: ClothingBackpackAstartesBase
  suffix: WH40K, Astartes
  components:
  - type: Sprite
    layers:
    - state: icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Clothing
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
  - type: SpeciesItemRestriction
    whitelist:
    - Astartes

