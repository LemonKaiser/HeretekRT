- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackSkitarii
  suffix: WH40K, АдМехи
  components:
  - type: Unremoveable
  - type: Sprite
    sprite: _WH40K/Clothing/Back/Backpacks/skitarii.rsi
  - type: UseDelay
    delay: 0.5
    delays:
      gasTank:
        length: 1.0
  - type: GasTank
    outputPressure: 101.3
    air:
      # Roughly 13 minutes of breathable mixed air at normal output pressure.
      volume: 10
      moles:
        Oxygen: 0.902606782
        Nitrogen: 3.200151318
      temperature: 293.15
    tankLowPressure: 30.0
  - type: InteractionOutline
  - type: Eye
  - type: WirelessNetworkConnection
    range: 200
  - type: SurveillanceCameraMicrophone
    blacklist:
      components:
        - SurveillanceCamera
        - SurveillanceCameraMonitor
        - RadioSpeaker
  - type: ActiveListener
    range: 6
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SurveillanceCameraScience
    transmitFrequencyId: SurveillanceCamera
  - type: SurveillanceCamera
    networkSet: true
  - type: UserInterface
    interfaces:
      enum.SurveillanceCameraSetupUiKey.Camera:
        type: SurveillanceCameraSetupBoundUi
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: TelecomServer
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
      storagebase: !type:Container
        ents: []
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
  - type: EncryptionKeyHolder
    keysExtractionMethod: Prying
    keySlots: 1

