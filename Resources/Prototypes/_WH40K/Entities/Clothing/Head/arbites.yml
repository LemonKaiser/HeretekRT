- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetArbiteMinoris
  suffix: WH40K, Арбитры, Arbites
  components:
  - type: Sprite
    sprite: _WH40K/Clothing/arbites/minoris/helmet.rsi
  - type: Clothing
    sprite: _WH40K/Clothing/arbites/minoris/helmet.rsi
  - type: Item
    size: Normal
  - type: Armor
    armorRating: 150
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
  - type: ItemDurability
    maxDurability: 500
    protectsWearer: true
    protectedBodyParts: Head
    repairMaterial: Steel
    requiredWorkbenchTier: 2
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: HideLayerClothing
    layers:
      Hair: HEAD
  - type: ItemToggle
    onUse: false
    soundActivate:
      path: /Audio/Items/flashlight_on.ogg
    soundDeactivate:
      path: /Audio/Items/flashlight_off.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: ToggleClothing
    action: ActionWH40KToggleSpecialistHelmet
    disableOnUnequip: true
  - type: ComponentToggler
    components:
    - type: ShowHealthBars
    - type: ShowHealthIcons
    - type: WH40KNightVision
  - type: UseDelay
    delay: 1

