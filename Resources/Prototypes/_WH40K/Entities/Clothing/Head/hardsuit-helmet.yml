  id: ClothingHeadHelmetHardsuitVoidsmanStandard
  suffix: WH40K, войдсмены
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _WH40K/Clothing/Head/Hardsuits/voidsman.rsi
  - type: Clothing
    sprite: _WH40K/Clothing/Head/Hardsuits/voidsman.rsi
  - type: PointLight
    color: "#ffeead"
