- type: entity
  parent: ClothingHeadHelmetFlak
  id: ClothingHeadHelmetSavlar
  suffix: WH40K, Savlar
  components:
  - type: Sprite
    sprite: _WH40K/Clothing/Head/Helmets/savlar_helmet.rsi
  - type: Clothing
    sprite: _WH40K/Clothing/Head/Helmets/savlar_helmet.rsi

- type: entity
  parent: ClothingHeadHelmetFlakAdv
  id: ClothingHeadHelmetSpecialist
  suffix: WH40K, Specialist
  components:
  - type: Sprite
    sprite: _WH40K/Clothing/Head/Helmets/specialist_helmet.rsi
  - type: Clothing
    sprite: _WH40K/Clothing/Head/Helmets/specialist_helmet.rsi
  - type: ItemToggle
    onUse: false
    soundActivate:
      path: /Audio/Items/flashlight_on.ogg
    soundDeactivate:
      path: /Audio/Items/flashlight_off.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: ToggleClothing
    action: ActionWH40KToggleSpecialistHelmet
    disableOnUnequip: true
  - type: ComponentToggler
    components:
    - type: ShowHealthBars
    - type: ShowHealthIcons
    - type: NightVision
      isEquipment: true
      isActive: true
  - type: UseDelay
    delay: 1

- type: entity
  id: ActionWH40KToggleSpecialistHelmet
  name: Toggle specialist optics
  description: Toggles the helmet's night vision and health display.
  components:
  - type: InstantAction
    useDelay: 1
    itemIconStyle: BigItem
    event: !type:ToggleActionEvent
