#Voidsmans

#офицер
- type: entity
  parent: [ClothingOuterBase, GeigerCounterClothing, AllowSuitStorageClothing]
  id: ClothingOuterHardsuitVoidsmanStandard
  suffix: WH40K, войдсмены
  components:
  - type: Sprite
    sprite: _WH40K/Clothing/OuterClothing/Hardsuits/voidsman.rsi
  - type: Clothing
    sprite: _WH40K/Clothing/OuterClothing/Hardsuits/voidsman.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.50
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.50
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    armorRating: 160
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.90
        Piercing: 0.95
        Radiation: 0.65
        Caustic: 0.65
        Heat: 0.85
  - type: ItemDurability
    maxDurability: 480
    protectsWearer: true
    repairMaterial: Steel
    requiredWorkbenchTier: 2
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: Item
    size: Ginormous
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
  - type: GroupExamine
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon

