- type: entity
  save: false
  name: Urist T'au
  parent: BaseMobHuman
  id: BaseMobTau
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Tau
    hideLayersOnEquip:
    - Hair
  - type: Icon
    sprite: _WH40K/Mobs/Species/Tau/parts.rsi
    state: full
  - type: Body
    prototype: Tau
    requiredLegs: 2
  - type: DamageVisuals
    thresholds: [ 8, 16, 24, 40, 56, 80 ]
    targetLayers:
    - enum.HumanoidVisualLayers.Chest
    - enum.HumanoidVisualLayers.Head
    - enum.HumanoidVisualLayers.LArm
    - enum.HumanoidVisualLayers.LLeg
    - enum.HumanoidVisualLayers.RArm
    - enum.HumanoidVisualLayers.RLeg
    damageOverlayGroups:
      Brute:
        sprite: _WH40K/Mobs/Species/Tau/brute_damage.rsi
        color: "#FF0000"
      Burn:
        sprite: _WH40K/Mobs/Species/Tau/burn_damage.rsi
  - type: SlowOnDamage
    speedModifierThresholds:
      48: 0.7
      64: 0.5
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Critical
      160: Dead
  - type: Stamina
    critThreshold: 80
  - type: ScaleVisuals
    scale: 1, 0.95
  - type: Inventory
    speciesId: tau

