- type: entity
  id: MobGrox
  name: grox
  description: A massive reptilian livestock beast. Calm until you hit it.
  parent: SimpleMobBase
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: base
      sprite: _WH40K/Mobs/Animals/grox.rsi
  - type: Tag
    tags:
    - DoorBumpOpener
    - Cow
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 400
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ProtectedFromStepTriggers
  - type: DamageStateVisuals
    states:
      Alive:
        Base: base
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: ExaminableHunger
  - type: Butcherable
    spawned:
    - id: FoodMeatGrox
      amount: 5
  - type: InteractionPopup
    successChance: 0.5
    interactDelay: 2
    interactSuccessString: petting-success-soft-floofy
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/cow_moo.ogg
  - type: Perishable
    molsPerSecondPerUnitMass: 0.0015
  - type: NpcFactionMember
    factions:
    - Passive
  - type: NPCRetaliation
    attackMemoryLength: 8
  - type: FactionException
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 25
  - type: HTN
    rootTask:
      task: RuminantHostileCompound
