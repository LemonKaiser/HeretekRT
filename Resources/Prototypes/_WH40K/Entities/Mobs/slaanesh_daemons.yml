- type: entity
  id: BaseMobWH40KSlaaneshDaemon
  parent: SimpleSpaceMobBase
  name: slaanesh daemon
  description: A daemonette-shaped horror clawing its way into realspace through excess and pain.
  suffix: WH40K, Slaanesh
  abstract: true
  components:
  - type: TypingIndicator
    proto: alien
  - type: NpcFactionMember
    factions:
    - Heretics
  - type: NPCRetaliation
    attackMemoryLength: 15
  - type: FactionException
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: CombatMode
  - type: ReplacementAccent
    accent: genericAggressive
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - FootstepSound
    - StunImmune

- type: entity
  id: MobWH40KSlaaneshDemonette
  parent: BaseMobWH40KSlaaneshDaemon
  name: daemonette of Slaanesh
  description: A lithe lesser daemon whose unsettling grace ends in razor claws and ecstatic violence.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _WH40K/Mobs/Slaanesh/demonette01.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 80
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.9
    baseSprintSpeed: 6.9
  - type: MeleeWeapon
    hidden: true
    altDisarm: false
    attackRate: 1.8
    angle: 0
    animation: WeaponArcSlash
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Slash: 18
        Piercing: 6
  - type: PointLight
    radius: 1.7
    energy: 1.6
    color: "#ff72d6"
    castShadows: false

