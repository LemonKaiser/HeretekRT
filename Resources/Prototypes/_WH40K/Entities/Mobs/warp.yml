- type: entity
  parent: MobHuman
  id: MobWH40KWarpDoppelganger
  name: warp doppelganger
  description: A hostile reflection torn free from the veil.
  components:
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 4.5
  - type: PointLight
    radius: 2
    energy: 2
    color: "#6f2cff"
    castShadows: false

- type: entity
  id: BaseMobWH40KWarpDaemon
  parent: SimpleSpaceMobBase
  name: warp daemon
  description: A hostile thing pulled out of the immaterium by a failed ritual.
  suffix: WH40K, Warp
  abstract: true
  components:
  - type: TypingIndicator
    proto: alien
  - type: NpcFactionMember
    factions:
    - Heretics
  - type: NPCRetaliation
    attackMemoryLength: 15
  - type: FactionException
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: SpawnOnTrigger
    proto: FoodMeatMeatball
  - type: DeleteOnTrigger
  - type: CombatMode
  - type: MeleeWeapon
    hidden: true
    angle: 0
    animation: WeaponArcClaw
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Slash: 10
  - type: ReplacementAccent
    accent: genericAggressive
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - FootstepSound
    - StunImmune

- type: entity
  id: MobWH40KWarpRunner
  parent: BaseMobWH40KWarpDaemon
  name: warp runner
  description: A quick, half-formed daemon that hunts by speed and numbers.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _WH40K/Mobs/Warp/runner.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
    scale: 1.25, 1.25
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        density: 80
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      110: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 5.1
    baseSprintSpeed: 7.2
  - type: MeleeWeapon
    hidden: true
    altDisarm: false
    attackRate: 1.8
    angle: 0
    animation: WeaponArcClaw
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Slash: 16
        Piercing: 4
  - type: PointLight
    radius: 1.6
    energy: 1.5
    color: "#c94cff"
    castShadows: false

