- type: entity
  abstract: true
  parent: BaseItem
  id: WH40KDeployableBarricadeKitBase
  name: deployable barricade kit
  description: Crated field barricade kit. Deploys one barricade on a nearby tile.
  suffix: WH40K
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Misc/barricade_kit.rsi
    state: icon
  - type: Icon
    sprite: _WH40K/Objects/Misc/barricade_kit.rsi
    state: icon
  - type: Item
    sprite: _WH40K/Objects/Misc/barricade_kit.rsi
    size: Huge
    inhandVisuals:
      left:
      - sprite: _WH40K/Objects/Misc/barricade_kit.rsi
        state: icon
      right:
      - sprite: _WH40K/Objects/Misc/barricade_kit.rsi
        state: icon
  - type: HandheldEntityPlacement
    entityType: BarricadeWarhammer
    previewEntityType: BarricadeWarhammer
    placementMode: SnapgridCenter
    range: 2
    canRotate: true
  - type: WH40KDeployableBarricade
    deployTime: 1.4

