- type: entity
  id: WH40KInflatableWallImperium
  name: imperium inflatable barricade
  parent: InflatableWall
  description: An inflated field barrier. Activate to deflate. Do not puncture.
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Misc/inflatable_wall.rsi
    state: wall
  - type: DisassembleOnAltVerb
    prototype: WH40KInflatableWallStackImperium1
    doAfter: 3

- type: entity
  id: WH40KInflatableDoorImperium
