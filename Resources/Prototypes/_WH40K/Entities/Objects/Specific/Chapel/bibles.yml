- type: entity
  parent: [WH40KDurableMeleeWeapon, BaseStorageItem]
  id: WH40KBible
  suffix: WH40K, Священник
  components:
  - type: ItemRarityRandom
    maxTier: 3
  - type: UseDelay
    delay: 10.0
  - type: Bible
    damage:
      types:
        Blunt: -5
        Piercing: -5
        Slash: -5
        Heat: -5
        Cold: -5
        Shock: -5
    damageOnFail:
      types:
        Blunt: 5
        Piercing: 5
        Slash: 5
        Asphyxiation: 15
    damageOnUntrainedUse: ## What a non-chaplain takes when attempting to heal someone
      types:
        Heat: 10
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Holy: 25
        Blunt: 1
  - type: ItemDurability
    maxDurability: 400
    repairMaterial: Cloth
    requiredWorkbenchTier: 1
  - type: Prayable
    bibleUserOnly: true
  - type: ReactionMixer
    mixMessage: "bible-mixing-success"
    reactionTypes:
    - Holy
  - type: Sprite
    sprite: _WH40K/Objects/Specific/bible.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _WH40K/Objects/Specific/bible.rsi
  - type: Clothing
    sprite: _WH40K/Objects/Specific/bible.rsi
    slots:
    - Belt
  - type: Storage
    grid:
    - 0,0,0,1
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Tag
    tags:
    - Book
    - WH40KBible
