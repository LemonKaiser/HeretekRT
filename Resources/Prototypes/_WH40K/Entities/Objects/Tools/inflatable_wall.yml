- type: entity
  id: WH40KInflatableWallStackImperium
  parent: [BaseItem, RecyclableItemPlasticSmall]
  name: imperium inflatable wall pack
  description: Folded rapid-deploy barrier for front-line engineers.
  suffix: Full
  components:
  - type: Stack
    stackType: InflatableWall
    count: 8
  - type: Sprite
    sprite: _WH40K/Objects/Misc/inflatable_wall.rsi
    state: folded_wall
  - type: Item
    sprite: _WH40K/Objects/Misc/inflatable_wall.rsi
    size: Small
  - type: SpawnAfterInteract
    prototype: WH40KInflatableWallImperium
    doAfter: 1
    removeOnInteract: true
  - type: Clickable
  - type: ConstructionMaterials

- type: entity
  id: WH40KInflatableWallStackImperium1
  parent: WH40KInflatableWallStackImperium
  suffix: 1
  components:
  - type: Stack
    count: 1

