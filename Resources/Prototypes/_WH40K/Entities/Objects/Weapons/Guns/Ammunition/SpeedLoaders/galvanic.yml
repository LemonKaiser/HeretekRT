- type: entity
  parent: BaseSpeedLoader45_magnum
  id: SpeedLoaderGalvanic
  components:
  - type: Tag
    tags:
      - SpeedLoaderGalvanic
  - type: BallisticAmmoProvider
    proto: CartridgeGalvanic
    whitelist:
      tags:
        - CartridgeGalvanic
    capacity: 10
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/SpeedLoaders/45_magnum/45_magnum_speed_loader.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-6
        map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: base
    steps: 7
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-ammo
      right:
      - state: inhand-right-mag
      - state: inhand-right-ammo

