- type: entity
  id: WeaponHeavyStubPistolBase
  parent: [WH40KDurableRangedWeapon, BaseWeaponPistol]
  abstract: true
  suffix: WH40K
  components:
  - type: Sprite
    scale: 0.85,0.85
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineHeavyStubPistol
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineHeavyStubPistol
      gun_chamber:
        name: Chamber
        startingItem: CartridgeHeavyStubPistol
        priority: 1
        whitelist:
          tags:
          - CartridgeHeavyStubPistol
  - type: Gun
    fireRate: 2
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/stubber_fire_3.wav

- type: entity
  id: WeaponHeavyStubPistolAquila
  parent: WeaponHeavyStubPistolBase
  suffix: WH40K, Imperium
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/heavy_stub_pistol_aquila.rsi
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/heavy_stub_pistol_aquila.rsi

- type: entity
  id: WeaponHeavyStubPistolBloodPact
  parent: WeaponHeavyStubPistolBase
  suffix: WH40K, Heretics
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/heavy_stub_pistol_blood_pact.rsi
  - type: Clothing
