- type: entity
  parent: [WH40KDurableRangedWeapon, BaseWeaponPistol]
  id: WeaponStubSMG
  suffix: WH40K, Хаос
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/stub_smg.rsi
    scale: 0.85,0.85
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/stub_smg.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineHevStubPistol
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineHevStubPistol
      gun_chamber:
        name: Chamber
        startingItem: Cartridge10mm
        priority: 1
        whitelist:
          tags:
            - Cartridge10mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      wh40k-weapon-mod-optic: !type:ContainerSlot
      wh40k-weapon-mod-muzzle: !type:ContainerSlot
      wh40k-weapon-mod-utility: !type:ContainerSlot
  - type: Gun
    fireRate: 5
    availableModes:
    - FullAuto
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/stubber_fire_3.wav
  - type: HeldSpeedModifier
    walkModifier: 0.97
    sprintModifier: 0.97
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 6
    energy: 2.2
    netsync: false

