- type: entity
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable]
  id: WeaponStubSMG3
  suffix: WH40K, Общий
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/stub_smg3.rsi
    scale: 0.85,0.85
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Autoguns/stub_smg3.rsi
  - type: Item
    size: Huge
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineStub3SMG
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineStub3SMG
      gun_chamber:
        name: Chamber
        startingItem: Cartridge10mmLong
        priority: 1
        whitelist:
          tags:
            - Cartridge10mmLong
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      wh40k-weapon-mod-underbarrel: !type:ContainerSlot
      wh40k-weapon-mod-muzzle: !type:ContainerSlot
      wh40k-weapon-mod-bayonet: !type:ContainerSlot
  - type: Gun
    fireRate: 7.5
    minAngle: 25
    maxAngle: 90
    angleIncrease: 3
    angleDecay: 25
    availableModes:
    - FullAuto
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/stubber_fire_3.wav
  - type: HeldSpeedModifier
    walkModifier: 0.98
    sprintModifier: 0.98

