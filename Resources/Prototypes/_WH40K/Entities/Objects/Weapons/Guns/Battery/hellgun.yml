      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Battery/hellgun_mk2/hellgun_mk2_in-hands.rsi
    size: Huge
    shape:
    - 0,0,4,1
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Battery/hellgun_mk2/hellgun_mk2_in-hands.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: HeldSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95

