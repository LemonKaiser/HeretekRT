- type: entity
  parent: [WeaponLaserWH40KEnergy, BaseGunWieldable]
  id: WeaponLaserLasgunAccatran
  suffix: WH40K
  components:
  - type: GunRequiresWield
  - type: Gun
    fireRate: 5.5
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_accatran/lasgun_in-hands.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_accatran/lasgun_in-hands.rsi
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_accatran/lasgun.rsi
    scale: 0.85,0.85
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AccatranPowerCell
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - AccatranPowerCell
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      wh40k-weapon-mod-optic: !type:ContainerSlot
      wh40k-weapon-mod-underbarrel: !type:ContainerSlot
      wh40k-weapon-mod-barrel: !type:ContainerSlot
      wh40k-weapon-mod-bayonet: !type:ContainerSlot
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 6.5
    energy: 2.3
    netsync: false

