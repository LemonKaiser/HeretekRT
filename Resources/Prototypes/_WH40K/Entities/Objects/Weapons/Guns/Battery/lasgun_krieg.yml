- type: entity
  parent: [WeaponLaserWH40KEnergy, BaseGunWieldable]
  id: WeaponLaserLasgunKrieg
  suffix: WH40K, Криг
  components:
  - type: Gun
    fireRate: 1.5
  - type: GunRequiresWield
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 35
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: MeleeRequiresWield
  - type: AltFireMelee
    attackType: Heavy
  - type: Sharp
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_krieg/lasgun_in-hands.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_krieg/lasgun_in-hands.rsi
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_krieg/lasgun.rsi
    scale: 0.85,0.85
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: LasgunPowerCellLucius
        whitelist:
          tags:
            - LasgunPowerCellLucius
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      wh40k-weapon-mod-optic: !type:ContainerSlot
      wh40k-weapon-mod-barrel: !type:ContainerSlot
      wh40k-weapon-mod-sling: !type:ContainerSlot
      wh40k-weapon-mod-bayonet: !type:ContainerSlot

