- type: entity
  parent: [WeaponLaserWH40KEnergy, BaseGunWieldable]
  id: WeaponLaserLasgunVoss
  suffix: WH40K
  components:
  - type: Gun
    fireRate: 3
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_voss/lasgun_in-hands.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_voss/lasgun_in-hands.rsi
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Battery/lasgun_voss/lasgun.rsi
    scale: 0.85,0.85
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: PowerCellVoss
        whitelist:
          tags:
            - LasgunPowerCellVoss
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      wh40k-weapon-mod-optic: !type:ContainerSlot
      wh40k-weapon-mod-stock: !type:ContainerSlot
      wh40k-weapon-mod-bayonet: !type:ContainerSlot

