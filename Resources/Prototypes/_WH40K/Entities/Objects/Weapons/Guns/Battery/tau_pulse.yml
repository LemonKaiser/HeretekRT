- type: entity
  parent: [WH40KDurableRangedWeapon, BaseWeaponBatterySmall]
  id: WeaponTauPulsePistol
  suffix: WH40K, Tau
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Battery/tau_pulse_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Battery/tau_pulse_pistol_inhands.rsi
    storedOffset: -2,-5
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Battery/tau_pulse_pistol_inhands.rsi
    quickEquip: false
    slots:
    - Belt
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
  - type: HitscanBatteryAmmoProvider
    proto: Pulse
    fireCost: 200
  - type: Battery
    maxCharge: 2000
    startingCharge: 2000
  - type: Tag
    tags:
    - Sidearm
    - LaserWeapon

