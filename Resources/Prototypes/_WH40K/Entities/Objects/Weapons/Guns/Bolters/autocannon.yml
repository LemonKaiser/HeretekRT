- type: entity
  parent: WH40KHeavyBolter
  id: WH40KAutocannon
  name: autocannon emplacement
  description: A crew-operated autocannon. Deploy it, take position behind the gun, and hammer armored targets and fortified lanes.
  suffix: WH40K, стационарное
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: [ "enum.WH40KHeavyBolterVisualLayers.Folded" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/autocannon.rsi
      state: unanchored
    - map: [ "enum.WH40KHeavyBolterVisualLayers.Deployed" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/autocannon_emplacement.rsi
      state: heavy_bolter
      visible: false
    - map: [ "enum.GunVisualLayers.Mag" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/autocannon_emplacement.rsi
      state: mag-0
      visible: false
  - type: Icon
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/autocannon.rsi
    state: icon
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/autocannon.rsi
  - type: Gun
    fireRate: 1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: WH40KMagazineAutocannon
        priority: 2
        whitelist:
          tags:
          - WH40KMagazineAutocannon

