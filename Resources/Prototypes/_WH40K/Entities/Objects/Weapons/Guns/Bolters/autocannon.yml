    - map: [ "enum.WH40KHeavyBolterVisualLayers.Deployed" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosautocannon_emplacement.rsi
      state: heavy_bolter
      visible: false
    - map: [ "enum.GunVisualLayers.Mag" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosautocannon_emplacement.rsi
      state: mag-0
      visible: false
  - type: Icon
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosautocannon.rsi
    state: icon
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosautocannon.rsi

