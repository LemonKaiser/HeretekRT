- type: entity
  id: WeaponRifleBolter
  parent: [WH40KDurableRangedWeapon, BaseWeaponRifle]
  suffix: WH40K
  components:
  - type: ItemRarityRandom
    maxTier: 5
  - type: Gun
    fireRate: 1.7
    selectedMode: FullAuto
    availableModes:
      - FullAuto
      - SemiAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/bolter.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineBolter
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineBolter75
      gun_chamber:
        name: Chamber
        startingItem: CartridgeBolter
        priority: 1
        whitelist:
          tags:
            - CartridgeBolter75
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/bolter.rsi
    size: Huge
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/bolter.rsi
    scale: 0.9,0.9
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance

- type: entity
  parent: [WH40KDurableRangedWeapon, BaseWeaponPistol]
  id: WeaponPistolBolter
  suffix: WH40K
  components:
  - type: ItemRarityRandom
    maxTier: 5
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/pistol.rsi
    scale: 0.9,0.9
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/pistol.rsi
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: Gun
    fireRate: 1.2
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/bolterpistol.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineBolterPistol
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineBolterPistol75
      gun_chamber:
        name: Chamber
        startingItem: CartridgeBolter
        priority: 1
        whitelist:
          tags:
            - CartridgeBolter75
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  parent: WeaponLaserWH40KEnergy
  id: WeaponPistolAstartesBolt
  suffix: WH40K, Astartes
  components:
  - type: ItemRarityRandom
    maxTier: 6
  - type: SpeciesItemRestriction
    whitelist:
    - Astartes
    restrictGun: true
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/astartes_pistol.rsi
    scale: 0.9,0.9
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/astartes_pistol.rsi
    size: Normal
    shape:
    - 0,0,1,1
  - type: Tag
    tags:
    - Sidearm
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/astartes_pistol.rsi
    slots:
    - Belt
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    minAngle: 1
    maxAngle: 8
    angleIncrease: 3
    angleDecay: 10
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/lasgunpew.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: WH40KAstartesLaserPistolPowerCell
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - WH40KAstartesLaserPistolPowerCell

