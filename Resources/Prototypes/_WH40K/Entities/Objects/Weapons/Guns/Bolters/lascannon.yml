- type: entity
  parent: WH40KHeavyBolter
  id: WH40KLascannon
  name: lascannon emplacement
  description: A crew-operated lascannon. Deploy it, take position behind the gun, and punch through priority targets with focused beams.
  suffix: WH40K, стационарное
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: [ "enum.WH40KHeavyBolterVisualLayers.Folded" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/lascannon.rsi
      state: unanchored
    - map: [ "enum.WH40KHeavyBolterVisualLayers.Deployed" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/lascannon_emplacement.rsi
      state: heavy_bolter
      visible: false
    - map: [ "enum.GunVisualLayers.Mag" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/lascannon_emplacement.rsi
      state: mag-0
      visible: false
  - type: Icon
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/lascannon.rsi
    state: icon
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Bolters/lascannon.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,-0.28125"
        density: 1500
        mask:
        - FullTileMask
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: WH40KMagazineLascannon
        priority: 2
        whitelist:
          tags:
          - WH40KMagazineLascannon

