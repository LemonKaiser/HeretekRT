    - map: [ "enum.WH40KHeavyBolterVisualLayers.Deployed" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosmultilas_emplacement.rsi
      state: heavy_bolter
      visible: false
    - map: [ "enum.GunVisualLayers.Mag" ]
      sprite: _WH40K/Objects/Weapons/Guns/Bolters/chaosmultilas_emplacement.rsi
      state: mag-0
