- type: entity
  parent: [BaseWeaponRevolver, BaseGunWieldable]
  id: WeaponLauncherCadia
  suffix: WH40K, Imperium
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Launcher/grenade_cadia/grenade_cadia_icon.rsi
    layers:
      - state: icon
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Launcher/grenade_cadia/grenade_cadia.rsi
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Huge
    shape:
    - 0,0,4,2
  - type: RevolverAmmoProvider
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
    whitelist:
      tags:
        - Grenade
    proto: GrenadeFrag
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: Gun
    fireRate: 1
    projectileSpeed: 25 # Slower than a bullet, same speed as our old projectile limit.
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
  - type: GunRequiresWield

