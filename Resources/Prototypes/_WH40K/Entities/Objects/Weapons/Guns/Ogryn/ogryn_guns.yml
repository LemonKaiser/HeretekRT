- type: entity
  parent: [WH40KDurableHeavyRangedWeapon, BaseItem, BaseGunWieldable]
  id: WeaponOgrynLoyalRipperGun
  suffix: WH40K, Ogryn, Loyal
  components:
  - type: GunRequiresWield
  - type: Item
    size: Huge
    sprite: _WH40K/Objects/Weapons/Guns/Ogryn/ogryn_loyal_ripper_gun.rsi
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Ogryn/ogryn_loyal_ripper_gun.rsi
    scale: 0.9, 0.9
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Ogryn/ogryn_loyal_ripper_gun.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 1.4
    minAngle: 10
    maxAngle: 18
    angleIncrease: 2.4
    angleDecay: 8
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineOgrynLoyalRipper
        priority: 2
        whitelist:
          tags:
          - MagazineOgrynRipper
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Appearance
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: HeldSpeedModifier
    walkModifier: 0.94
    sprintModifier: 0.94
  - type: StaticPrice
    price: 700

