- type: entity
  parent: BaseBulletTrigger
  id: PromethiumBullet
  categories: [ HideSpawnMenu ]
  components:
    - type: TimedDespawn
      lifetime: 0.3
    - type: PointLight
      color: "#FFA600"
      radius: 5
      energy: 5
    - type: Sprite
      noRot: false
      rotation: -90
      sprite: _WH40K/Objects/Weapons/Guns/Ammunition/Projectiles/flame.rsi
      layers:
        - state: base
          shader: unshaded
    - type: FlyBySound
    - type: Clickable
    - type: Physics
      bodyType: Dynamic
      linearDamping: 0.1
      angularDamping: 25
    - type: Fixtures
      fixtures:
        projectile:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.1,-0.1,0.1,0.1"
          hard: false
          mask:
          - Impassable
          - BulletImpassable
          - MidImpassable
          - HighImpassable
          - LowImpassable
        fly-by: &flybyfixture
          shape: !type:PhysShapeCircle
            radius: 1.5
          layer:
          - Impassable
          - MidImpassable
          - HighImpassable
          - LowImpassable
          hard: False
    - type: Projectile
      impactEffect: BulletImpactEffect
      damage:
        types:
          Heat: 1
    - type: IgniteOnCollide
      fireStacks: 1
      count: 3

