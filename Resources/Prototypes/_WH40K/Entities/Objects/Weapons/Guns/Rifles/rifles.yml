- type: entity
  parent: [WH40KDurableRangedWeapon, BaseWeaponRifle]
  id: WeaponRifleRadCarabin
  suffix: WH40K, АдМехи
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/rad_carbine.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/rad_carbine_in-hands.rsi
  - type: Gun
    fireRate: 5
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/rad_carbine.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRadCarabin
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRad
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRadCarabin
        priority: 1
        whitelist:
          tags:
            - Cartridge308
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: RadiationSource
    intensity: 0.01
    slope: 1
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/rad_carbine_in-hands.rsi
    size: Large
  # - type: Tag
  #   tags:
  #     - BigGunUser
  # - type: BigGun

- type: entity
  parent: [WH40KDurableRangedWeapon, BaseWeaponRevolver, BaseGunWieldable]
  id: WeaponRifleGalvanic
  suffix: WH40K, АдМехи
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/galvanic.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/galvanic_in-hands.rsi
  - type: Item
    sprite: _WH40K/Objects/Weapons/Guns/Rifles/galvanic_in-hands.rsi
    size: Large
  - type: Gun
    fireRate: 2.5
    minAngle: 90
    maxAngle: 180
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/rad_carbine.ogg
  - type: GunWieldBonus
    minAngle: -90
    maxAngle: -180
  - type: RevolverAmmoProvider
    capacity: 10
    chambers: [ True, True, True, True, True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null, null, null, null, null ]
    whitelist:
      tags:
        - SpeedLoaderGalvanic
        - CartridgeGalvanic
    proto: CartridgeGalvanic
  - type: Appearance
  - type: HeldSpeedModifier
    walkModifier: 0.98
    sprintModifier: 0.98

