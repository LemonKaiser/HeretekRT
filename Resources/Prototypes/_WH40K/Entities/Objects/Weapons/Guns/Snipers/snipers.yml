- type: entity
  parent: BaseWeaponRifle
  id: BaseWeaponSniperLondoronMk2
  abstract: true
  components:
  - type: GunRequiresWield
  - type: Item
    size: Huge
    shape:
    - 0,0,4,1
  - type: Gun
    fireRate: 0.4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLondoronMk2
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineLondoronMk2
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLondoronMk2
        priority: 1
        whitelist:
          tags:
          - CartridgeLondoronMk2
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  parent: BaseWeaponSniperLondoronMk2
  id: WeaponSniperLondoronMk2
  suffix: WH40K, Neutral
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Snipers/londoron_mk2.rsi
    scale: 0.85,0.85
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
