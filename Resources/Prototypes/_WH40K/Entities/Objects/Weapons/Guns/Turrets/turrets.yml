- type: entity
  id: WH40KWeaponTurretBallisticBase
  abstract: true
  parent: BaseWeaponBallisticTurret
  name: bolter field sentry turret
  description: A field turret built around a bolter-pattern weapon package.
  components:
  - type: Gun
    fireRate: 3
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/bolter.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: CartridgeBolter
    fireCost: 60
  - type: BatterySelfRecharger
    autoRechargeRate: 20

- type: entity
  id: WH40KWeaponTurretImperium
  parent: WH40KWeaponTurretBallisticBase
  suffix: WH40K, Imperium
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Guns/Turrets/tarantulaimp.rsi
    drawdepth: Mobs
    layers:
    - state: base
  - type: NpcFactionMember
    factions:
    - Imperium

