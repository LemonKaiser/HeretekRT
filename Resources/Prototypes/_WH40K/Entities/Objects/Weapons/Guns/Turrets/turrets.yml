- type: entity
  id: WH40KWeaponTurretLaserBase
  abstract: true
  parent: BaseWeaponTurret
  name: multilaser field sentry turret
  description: A powered field turret armed with a multilaser package.
  components:
  - type: Gun
    projectileSpeed: 15
    fireRate: 4
    maxAngle: 15
    minAngle: 4
    angleIncrease: -1.2
    angleDecay: -4
    soundGunshot:
      path: /Audio/_WH40K/Weapons/Guns/Gunshots/lasgunpew.ogg
  - type: HitscanBatteryAmmoProvider
    proto: LaserMultilas
    fireCost: 120
  - type: Battery
    maxCharge: 3000
    startingCharge: 0
  - type: ApcPowerReceiverBattery
    idleLoad: 5
    batteryRechargeRate: 240
    batteryRechargeEfficiency: 1.225
  - type: ApcPowerReceiver
    powerLoad: 5
  - type: ExtensionCableReceiver

