- type: entity
  id: FlameThrowerGun
  parent: [BaseItem, BaseGunWieldable]
  suffix: WH40K
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Flamethrower/flamethrower.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Flamethrower/flamethrower.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 7
    minAngle: 0
    maxAngle: 45
    selectedMode: FullAuto
    resetOnHandSelected: true
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_WH40K/Weapons/flamethrower.ogg
      params:
        volume: 3
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: "баллон с прометием для огнемётов"
        startingItem: FlameThrowerTank
        insertSound: /Audio/Effects/squeak1.ogg
        ejectSound: /Audio/Effects/squeak3.ogg
        priority: 2
        whitelist:
          tags:
          - FlameThrowerFuelTank
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: Appearance
  - type: Item
    size: Huge
    shape:
    - 0,0,5,3
  - type: StaticPrice
    price: 500
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true

- type: entity
  id: ChaosFlameThrowerGun
  parent: FlameThrowerGun
  suffix: WH40K, Chaos
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Flamethrower/chaos_flamethrower.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WH40K/Objects/Weapons/Flamethrower/chaos_flamethrower.rsi
