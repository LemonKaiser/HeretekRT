- type: entity
  parent: [WH40KDurableHeavyMeleeWeapon, BaseItem]
  id: ChainswordEvestiator
  suffix: WH40K
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Weapons/Melee/chainsword_evestiator/long.rsi
    layers:
    - state: off-icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: MultiHandedItem
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 3
    range: 1.6
    damage:
      types:
        Blunt: 1.25
    soundHit:
      path: /Audio/Weapons/chainsaw.ogg
      params:
        volume: -3
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/chainsawwield.ogg
      params:
        volume: -3
    soundDeactivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 40
        Shock: 5
    activatedSoundOnHit:
      path: /Audio/Weapons/chainsaw.ogg
      params:
        volume: -3
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 12.5
  - type: UseDelay
  - type: Item
    sprite: _WH40K/Objects/Weapons/Melee/chainsword_evestiator/long.rsi
    heldPrefix: off
    size: Ginormous
  - type: Appearance
  - type: HeldSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: on-icon}
          False: {state: off-icon}


