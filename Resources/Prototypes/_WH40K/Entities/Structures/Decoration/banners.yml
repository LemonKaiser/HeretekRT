- type: entity
  id: WHChaosBanner
  parent: BaseStructureDynamic
  suffix: WH40K, Хаос
  components:
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Anchorable
    flags:
    - Anchorable
  - type: Rotatable
  - type: Pullable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 190
        mask:
        - MachineMask
        layer:
        - Opaque
        - MidImpassable
        - HighImpassable
        - BulletImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
          params:
            volume: 1
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Sprite
    sprite: _WH40K/Structures/Decorations/banners.rsi
    state: chaos_banner
  - type: WH40KWaveShader
    speed: 2.4
    dis: 4.2
  - type: Construction
    graph: WH40KBanners
    node: chaosBanner

