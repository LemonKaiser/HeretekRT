    anchored: true
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,0.37,0.1,0.55"
        density: 200
        mask:
        - MachineMask
        layer:
        - MidImpassable
