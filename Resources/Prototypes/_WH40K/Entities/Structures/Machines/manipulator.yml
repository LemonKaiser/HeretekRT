- type: entity
  id: WH40KConveyorManipulator
  parent: BaseStructure
  name: conveyor manipulator
  description: A legacy WH40K manipulator shell preserved as decorative machinery.
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: InteractionOutline
  - type: Rotatable
  - type: Sprite
    sprite: _WH40K/Structures/Machines/manipulator.rsi
    state: icon
  - type: Icon
    sprite: _WH40K/Structures/Machines/manipulator.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 500
  - type: RequireProjectileTarget
