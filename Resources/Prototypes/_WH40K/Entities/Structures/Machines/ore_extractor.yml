- type: entity
  id: WH40KOreExtractorBase
  parent: BaseStructure
  abstract: true
  name: ore extractor
  description: A legacy WH40K extractor shell preserved as decorative machinery.
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
    noRot: false
  - type: InteractionOutline
  - type: Rotatable
  - type: Sprite
    sprite: _WH40K/Structures/Machines/ore_extractor.rsi
    state: icon
    snapCardinals: true
  - type: Icon
    sprite: _WH40K/Structures/Machines/ore_extractor.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 500
  - type: RequireProjectileTarget

- type: entity
  id: WH40KOreExtractorImperium
  parent: WH40KOreExtractorBase
  suffix: WH40K, Imperium, decor

- type: entity
  id: WH40KOreExtractorHeretics
  parent: WH40KOreExtractorBase
  suffix: WH40K, Heretics, decor

- type: entity
  id: WH40KOreExtractor
  parent: WH40KOreExtractorBase
  suffix: WH40K, SharedLegacy, decor
