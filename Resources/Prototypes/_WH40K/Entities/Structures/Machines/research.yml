- type: entity
  id: WH40KResearchAndDevelopmentServer
  parent: BaseStructure
  name: R&D server
  description: A legacy WH40K research server shell kept as decorative machinery.
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: InteractionOutline
  - type: Sprite
    sprite: _WH40K/Structures/Machines/server.rsi
    snapCardinals: true
    layers:
    - state: server
    - state: candle
      shader: unshaded
    - state: variant-research
      shader: unshaded
  - type: Icon
    sprite: _WH40K/Structures/Machines/server.rsi
    state: server
  - type: PointLight
    enabled: true
    castShadows: false
    radius: 1.2
    energy: 3.0
    color: "#b211b2"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 900
  - type: RequireProjectileTarget

- type: entity
  id: WH40KResearchAndDevelopmentServerImperium
  parent: WH40KResearchAndDevelopmentServer
  name: imperium R&D server
  suffix: WH40K, Imperium, decor

- type: entity
  id: WH40KResearchAndDevelopmentServerHeretics
  parent: WH40KResearchAndDevelopmentServer
  name: heretic R&D server
  suffix: WH40K, Heretics, decor

- type: entity
  id: WH40KBaseResearchAndDevelopmentComputer
  parent: BaseStructure
  abstract: true
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: InteractionOutline
  - type: Rotatable
  - type: PointLight
    enabled: true
    radius: 1.5
    energy: 4.0
    color: "#b53ca1"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 700
  - type: RequireProjectileTarget
  - type: SpriteFade

- type: entity
  id: WH40KComputerResearchAndDevelopmentImperium
  parent: WH40KBaseResearchAndDevelopmentComputer
  name: imperium R&D computer
  description: A legacy WH40K research console preserved as decorative machinery.
  suffix: WH40K, Imperium, decor
  components:
  - type: Sprite
    sprite: _WH40K/Structures/Machines/admech_modular_computer.rsi
    offset: 0.5,0
    layers:
    - state: base
    - state: unshaded
      shader: unshaded
  - type: Icon
    sprite: _WH40K/Structures/Machines/admech_modular_computer.rsi
    state: base

- type: entity
  id: WH40KComputerResearchAndDevelopmentHeretics
  parent: WH40KBaseResearchAndDevelopmentComputer
  name: heretic R&D computer
  description: A legacy WH40K research console preserved as decorative machinery.
  suffix: WH40K, Heretics, decor
  components:
  - type: Sprite
    sprite: _WH40K/Structures/Machines/modular_computer.rsi
    drawdepth: Mobs
    offset: 0,0.4
    layers:
    - state: base
    - state: unshaded
      shader: unshaded
  - type: Icon
    sprite: _WH40K/Structures/Machines/modular_computer.rsi
    state: base
