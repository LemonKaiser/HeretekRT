- type: entity
  id: WH40KStrategicPointDecorBase
  parent: BaseStructure
  abstract: true
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 120
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: InteractionOutline
  - type: RequireProjectileTarget
  - type: StaticPrice
    price: 450

- type: entity
  id: WH40KStrategicPointAnchorResource
  parent: WH40KStrategicPointDecorBase
  name: resource anchor
  description: A visual-only strategic resource anchor.
  suffix: WH40K, Strategic Point, Resource, T0
  components:
  - type: Sprite
    sprite: _WH40K/StrategicPoints/resource/t0_pit.rsi
    noRot: true
    layers:
    - state: base
  - type: Icon
    sprite: _WH40K/StrategicPoints/resource/t0_pit.rsi
    state: base

- type: entity
  id: WH40KStrategicPointAnchorResearch
  parent: WH40KStrategicPointDecorBase
  name: research anchor
  description: A visual-only strategic research anchor.
  suffix: WH40K, Strategic Point, Research, T0
  components:
  - type: Sprite
    sprite: _WH40K/StrategicPoints/research/noktolit_chaos.rsi
    drawdepth: OverMobs
    offset: 0,0.5
    noRot: true
    layers:
    - state: base
  - type: Icon
