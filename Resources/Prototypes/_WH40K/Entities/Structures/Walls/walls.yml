- type: entity
  parent: BaseWall
  id: WallMetal
  suffix: WH40K, сверхукреплённая
  components:
  - type: Sprite
    sprite: _WH40K/Structures/Walls/solid.rsi
  - type: Icon
    sprite: _WH40K/Structures/Walls/solid.rsi
    state: rgeneric
  - type: Construction
    graph: Girder
    node: reinforcedWall
  - type: Damageable
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1800
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: IconSmooth
    key: walls
    base: reinf_over
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ReinforcedWallVisuals.DeconstructionStage:
        ReinforcedWallVisualLayers.Deconstruction:
          -1: { visible: false }
          0: { state: reinf_construct-0, visible: true}
          1: { state: reinf_construct-1, visible: true}
          2: { state: reinf_construct-2, visible: true}
          3: { state: reinf_construct-3, visible: true}
          4: { state: reinf_construct-4, visible: true}
          5: { state: reinf_construct-5, visible: true}
  - type: ReinforcedWallReplacementMarker
  - type: StaticPrice
    price: 150
  - type: RadiationBlocker
    resistance: 8

- type: entity
  parent: WallShuttleDiagonal
  id: WallMetalDiagonal
  suffix: WH40K, диагональная, сверхукреплённая
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _WH40K/Structures/Walls/solid_diagonal.rsi
    layers:
    - state: state0
    - sprite: Structures/Walls/solid_diagonal.rsi
      state: state0
      rotation: 180
      color: "#000000"
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state
  - type: Icon
    sprite: _WH40K/Structures/Walls/solid_diagonal.rsi
    state: state0

- type: entity
  parent: WallReinforcedDiagonal
  id: WH40KWallReinforcedDiagonalDark
  suffix: WH40K, dark, diagonal, reinforced
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _WH40K/Structures/Walls/solid_diagonal.rsi
    layers:
    - state: state0
    - sprite: Structures/Walls/solid_diagonal.rsi
      state: state0
      rotation: 180
      color: "#000000"
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state
  - type: Icon
    sprite: _WH40K/Structures/Walls/solid_diagonal.rsi
    state: state0

- type: entity
  parent: BaseWall
  id: WallRockIndestructible
  suffix: WH40K, неразрушимая
  components:
  - type: Icon
    sprite: _WH40K/Structures/Walls/rock.rsi
    state: rock
  - type: MiningScannerViewable
  - type: SmoothEdge
  - type: Sprite
    sprite: _WH40K/Structures/Walls/rock.rsi
    layers:
    - state: rock
    - map: [ "enum.EdgeLayer.South" ]
      state: rock_south
    - map: [ "enum.EdgeLayer.East" ]
      state: rock_east
    - map: [ "enum.EdgeLayer.North" ]
      state: rock_north
    - map: [ "enum.EdgeLayer.West" ]
      state: rock_west
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 4000
  - type: Damageable
    damageModifierSet: StructuralMetallicStrong
  - type: RadiationBlocker
    resistance: 5
