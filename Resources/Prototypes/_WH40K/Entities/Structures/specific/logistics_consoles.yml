- type: entity
  id: WH40KDecorativeConsoleBase
  parent: BaseStructure
  abstract: true
  suffix: WH40K, decor
  components:
  - type: Transform
    anchored: true
  - type: InteractionOutline
  - type: RequireProjectileTarget
  - type: SpriteFade
  - type: StaticPrice
    price: 250

- type: entity
  id: StructureLogisticsConsoleImperiumCmd
  parent: WH40KDecorativeConsoleBase
  name: imperium command terminal
  description: A decorative shell of the imperial command terminal.
  suffix: WH40K, Imperium, decor
  components:
  - type: Sprite
    sprite: _WH40K/Structures/Machines/Computers/srtimperium.rsi
    drawdepth: Objects
    layers:
    - state: computer
    - state: computer_on
      shader: unshaded
  - type: Icon
    sprite: _WH40K/Structures/Machines/Computers/srtimperium.rsi
    state: computer
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.2,0.3,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - TabletopMachineLayer

