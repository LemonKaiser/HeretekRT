- type: entity
  name: guardsman matchbox
  parent: Matchbox
  id: MatchboxGuardsman
  description: A military issue box of storm-proof matches.
  suffix: WH40K
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Tools/guardsman_matchpack.rsi
    layers:
    - state: matchbox
    - state: matchbox-open
      map: ["openLayer"]
    - state: matchbox1
      map: ["matchbox1"]
      visible: false
    - state: matchbox2
      map: ["matchbox2"]
      visible: false
    - state: matchbox3
      map: ["matchbox3"]
      visible: false
    - state: matchbox4
      map: ["matchbox4"]
      visible: false
    - state: matchbox5
      map: ["matchbox5"]
      visible: false
    - state: matchbox6
      map: ["matchbox6"]
      visible: false
    - state: matchbox7
      map: ["matchbox7"]
      visible: false
    - state: matchbox8
      map: ["matchbox8"]
      visible: false
  - type: Item
    sprite: _WH40K/Objects/Tools/guardsman_matchpack.rsi
    size: Small
  - type: Storage
    grid:
    - 0,0,3,1
  - type: StorageFill
    contents:
    - id: MatchstickGuardsman
      amount: 8
  - type: ItemCounter
    count:
      tags: [Matchstick]
    composite: true
    layerStates:
    - matchbox1
    - matchbox2
    - matchbox3
    - matchbox4
    - matchbox5
    - matchbox6
    - matchbox7
    - matchbox8

- type: entity
  parent: Matchstick
  id: MatchstickGuardsman
  description: A military issue match stick that burns longer than a standard one.
  suffix: WH40K
  components:
  - type: Matchstick
    duration: 20
