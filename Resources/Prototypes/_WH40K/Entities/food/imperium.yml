- type: entity
  parent: [BoxCardboard, BaseBagOpenClose]
  id: FoodBoxImperialMRE
  name: imperial M.R.E.
  suffix: WH40K
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Consumable/Food/Boxes/imperial_mre.rsi
    layers:
    - state: box
      map: ["closeLayer"]
    - state: box-open
      map: ["openLayer"]
      visible: false
  - type: Item
    sprite: _WH40K/Objects/Consumable/Food/Boxes/imperial_mre.rsi
    size: Small
    shape:
    - 0,0,1,1
  - type: Storage
    grid:
    - 0,0,3,1
    maxItemSize: Small
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - !type:EntSelector
          id: DrinkGuardsmanFlask
        - !type:EntSelector
          id: MatchboxGuardsman
        - !type:EntSelector
          id: FoodSnackImperialHardtack
        - !type:GroupSelector
          rolls: !type:ConstantNumberSelector
            value: 2
          children:
          - !type:EntSelector
            id: FoodTinGroxPorridge
          - !type:EntSelector
            id: FoodTinGroxMeat
          - !type:EntSelector
            id: FoodTinNutriPaste
          - !type:EntSelector
            id: FoodTinNutriPasteMeat
  - type: Appearance

