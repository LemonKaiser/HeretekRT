- type: entity
  parent: FlaskBase
  id: DrinkTauFlask
  name: tau flask
  suffix: WH40K, Tau, Full
  components:
  - type: Sprite
    sprite: _WH40K/Objects/Consumable/Drinks/tau_flask.rsi
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60
        reagents:
        - ReagentId: Water
          Quantity: 60
  - type: Item
    size: Small

- type: entity
