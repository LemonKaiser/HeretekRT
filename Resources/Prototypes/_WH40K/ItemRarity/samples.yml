# Test-only prototypes for the rarity roll and Stage 2 stat scaling.
# They are the only rarity profiles that roll when spawned directly from the menu.
- type: entity
  parent: ClothingOuterArmorFlakVest
  id: ItemRarityTestFlakArmor
  suffix: WH40K, Rarity Test, Flak Armor
  components:
  - type: ItemRarityRandom
    maxTier: 3
    randomizeOnDirectSpawn: true

- type: entity
  parent: WeaponProtoKineticAcceleratorBase
  id: ItemRarityTestWeapon
  name: rarity test weapon
  suffix: WH40K, Rarity Test, 10 Damage
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi
    layers:
    - state: icon
    - state: animation-icon
      visible: false
      map: [ "empty-icon" ]
  - type: ItemRarityRandom
    maxTier: 6
    baseWeaponDamageMultiplier: 1
    baseWeaponArmorPenetration: 5
    randomizeOnDirectSpawn: true
  - type: BasicEntityAmmoProvider
    proto: ItemRarityTestProjectile
    capacity: 30
    count: 30

- type: entity
  parent: BaseBullet
  id: ItemRarityTestProjectile
  name: rarity test projectile
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    armorPenetration: 2
    damage:
      types:
        Piercing: 10

