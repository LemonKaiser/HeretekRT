- type: constructionGraph
  id: WH40KChaosBrickWall
  start: start
  graph:
  - node: start
    edges:
    - to: girder
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

  - node: girder
    entity: WH40KChaosWallGirder
    edges:
    - to: start
      conditions:
      - !type:EntityAnchored
        anchored: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 2
      - !type:DeleteEntity {}
      steps:
      - tool: Screwing
        doAfter: 2
    - to: chaosWall
      conditions:
      - !type:EntityAnchored {}
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: Plasteel
        amount: 1
        doAfter: 1
      - material: MetalRod
        amount: 4
        doAfter: 1
      - material: Plasteel
        amount: 1
        doAfter: 1

  - node: chaosWall
    entity: WallMetalChaosBrick
    edges:
    - to: girder
      completed:
      - !type:SpawnPrototype
        prototype: SheetPlasteel1
        amount: 1
      - !type:SpawnPrototype
        prototype: PartRodMetal1
        amount: 4
      steps:
      - tool: Cutting
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 5
      - tool: Screwing
        doAfter: 1
      - tool: Welding
        doAfter: 5
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 4
      - tool: Prying
        doAfter: 1
      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 3
      - tool: Welding
        doAfter: 10
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 2
      - tool: Prying
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 1
      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: enum.ReinforcedWallVisuals.DeconstructionStage
          data: 0
      - tool: Cutting
        doAfter: 1

