  blockOtherPlayerStrip: true
  blockPlayerExplosions: true
  protectPlayerShipWires: true
  protectPlayerShipDeconstruction: true
  protectStation: true
  blockForcedBuckle: true
  blockPlayerHarmfulInteractions: true
  protectNonHostileMobs: true
