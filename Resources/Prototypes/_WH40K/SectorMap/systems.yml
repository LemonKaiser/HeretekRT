# The positions are normalized against koronus-expanse-map.png. Replace grid paths here as authored system maps appear.
- type: koronusSystem
  id: Footfall
  sector: KoronusExpanse
  displayName: Furibundus (Footfall)
  uiPosition: 0.541, 0.871
  initialGridSpawnDistance: 3000
  initialGridDisplayName: Футфол
  # The round-start Footfall grid is moved to a random angle at this radius from Furibundus.
  spaceMode: Planetary
  stellarCenter: 0, 0
  enabled: true
  boundaryRadius: 5000
  pauseWhenEmpty: false
  # Footfall is the newcomer system: PvP and sabotage are blocked across its whole space map.
  # Do not add a dynamic zone here, otherwise its green circle would falsely imply that safety
  # ends outside the station radius.
  safetyProfile: KoronusFullSafeSystem
  protectInitialGrid: true

